name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20, 22]

    runs-on: ${{ matrix.os }}
    name: pnpm (${{ matrix.os }}, Node ${{ matrix.node-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Validates pnpm workspace structure: symlinked vs injected dependencies,
      # version declarations in package.json, peer dependency configuration,
      # and lockfile correctness.
      - name: "Test: pnpm structure"
        run: pnpm test:structure

      # Builds TypeScript libraries (lib-a, lib-b, lib-c) with tsc.
      # Required before runtime tests since they import compiled output.
      - name: Build libraries
        run: pnpm build:libs

      # Verifies that each package loads its own version of lodash at runtime
      # (version isolation), that rxjs peer dependencies are shared correctly
      # across packages, and that cross-library imports work.
      - name: "Test: runtime version isolation"
        run: pnpm test:runtime

      # Builds Angular 19 app using the application builder (esbuild).
      # Verifies that workspace libraries and their isolated dependencies
      # are correctly resolved by Angular's build tooling.
      - name: "Build: Angular 19 (application builder)"
        run: pnpm build:app-latest

      # Builds Angular 16 app using the browser builder (webpack).
      # Tests backward compatibility with Angular's webpack-based build system.
      - name: "Build: Angular 16 (webpack builder)"
        run: pnpm build:app-v16

      # Builds Angular 14 app using the browser builder (webpack).
      # Tests the oldest supported Angular version with NgModule architecture.
      - name: "Build: Angular 14 (webpack builder)"
        run: pnpm build:app-v14

  bazel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: Bazel (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Builds workspace libraries using Bazel's rules_ts.
      # Validates that rules_js correctly manages node_modules and
      # TypeScript compilation within the Bazel sandbox.
      - name: "Build: libraries (rules_ts)"
        run: bazel build //libs/lib-a:pkg //libs/lib-b:pkg //libs/lib-c:pkg

      # Builds Angular 19 using rules_angular + custom esbuild plugin.
      # The esbuild plugin (bazel-sandbox-plugin.js) resolves packages
      # from the .aspect_rules_js package store inside the sandbox.
      - name: "Build: Angular 19 (esbuild, Bazel sandbox)"
        run: bazel build //apps/app-latest:build

      # Builds Angular 14 and 16 using rules_angular + custom webpack plugin.
      # The webpack plugin (BazelSandboxResolverPlugin) resolves packages
      # from the .aspect_rules_js package store inside the sandbox.
      # Skipped on Windows due to MAX_PATH issues with long @babel package names.
      - name: "Build: Angular 14/16 (webpack, Bazel sandbox, Linux only)"
        if: runner.os != 'Windows'
        run: bazel build //apps/app-v14:build //apps/app-v16:build

  ci:
    needs: [test, bazel]
    runs-on: ubuntu-latest
    if: always()
    name: CI Summary
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "pnpm tests failed"
            exit 1
          fi
          if [ "${{ needs.bazel.result }}" != "success" ]; then
            echo "Bazel builds failed"
            exit 1
          fi
          echo "All tests passed!"
