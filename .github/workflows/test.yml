name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]

    runs-on: ${{ matrix.os }}
    name: pnpm (${{ matrix.os }}, Node ${{ matrix.node-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: "Test: pnpm structure"
        id: structure
        if: always()
        run: pnpm test:structure

      - name: Build libraries
        id: build_libs
        if: always() && steps.structure.outcome != 'cancelled'
        run: pnpm build:libs

      - name: "Test: runtime version isolation"
        id: runtime
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm test:runtime

      - name: "Build: Angular 19 (application builder)"
        id: build_latest
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-latest

      - name: "Build: Angular 16 (webpack builder)"
        id: build_v16
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-v16

      - name: "Build: Angular 14 (webpack builder)"
        id: build_v14
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-v14

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/results"
          cat > "$RUNNER_TEMP/results/pnpm_${{ matrix.os }}_node${{ matrix.node-version }}.json" << RESULTS
          {
            "os": "${{ matrix.os }}",
            "node": "${{ matrix.node-version }}",
            "structure": "${{ steps.structure.outcome }}",
            "build_libs": "${{ steps.build_libs.outcome }}",
            "runtime": "${{ steps.runtime.outcome }}",
            "build_latest": "${{ steps.build_latest.outcome }}",
            "build_v16": "${{ steps.build_v16.outcome }}",
            "build_v14": "${{ steps.build_v14.outcome }}"
          }
          RESULTS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-pnpm-${{ matrix.os }}-node${{ matrix.node-version }}
          path: ${{ runner.temp }}/results/

  bazel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: Bazel (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: "Build: libraries (rules_ts)"
        id: build_libs
        if: always()
        shell: bash
        run: bazel build //libs/lib-a:pkg //libs/lib-b:pkg //libs/lib-c:pkg

      - name: "Test: runtime version isolation"
        id: runtime
        if: always() && steps.build_libs.outcome == 'success'
        shell: bash
        run: bazel test //:test_runtime

      - name: "Build: Angular 19 (esbuild, Bazel sandbox)"
        id: build_latest
        if: always() && steps.build_libs.outcome == 'success'
        shell: bash
        run: bazel build //apps/app-latest:build

      - name: "Build: Angular 16 (webpack, Bazel sandbox)"
        id: build_v16
        if: always() && steps.build_libs.outcome == 'success'
        shell: bash
        run: bazel build //apps/app-v16:build

      - name: "Build: Angular 14 (webpack, Bazel sandbox)"
        id: build_v14
        if: always() && steps.build_libs.outcome == 'success'
        shell: bash
        run: bazel build //apps/app-v14:build

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/results"
          cat > "$RUNNER_TEMP/results/bazel_${{ matrix.os }}.json" << RESULTS
          {
            "os": "${{ matrix.os }}",
            "build_libs": "${{ steps.build_libs.outcome }}",
            "runtime": "${{ steps.runtime.outcome }}",
            "build_latest": "${{ steps.build_latest.outcome }}",
            "build_v16": "${{ steps.build_v16.outcome }}",
            "build_v14": "${{ steps.build_v14.outcome }}"
          }
          RESULTS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-bazel-${{ matrix.os }}
          path: ${{ runner.temp }}/results/

  summary:
    needs: [test, bazel]
    runs-on: ubuntu-latest
    if: always()
    name: CI Summary

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: results-*

      - name: Generate summary
        shell: bash
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *) echo "➖" ;;
            esac
          }

          get() {
            local file="$1" key="$2"
            grep "\"$key\"" "$file" | sed 's/.*: *"\(.*\)".*/\1/'
          }

          # Load pnpm results
          declare -A P
          for f in results/results-pnpm-*/pnpm_*.json; do
            [ -f "$f" ] || continue
            os=$(get "$f" os)
            node=$(get "$f" node)
            k="${os}_${node}"
            for step in structure build_libs runtime build_latest build_v16 build_v14; do
              P["${k}_${step}"]=$(get "$f" "$step")
            done
          done

          # Load bazel results
          declare -A B
          for f in results/results-bazel-*/bazel_*.json; do
            [ -f "$f" ] || continue
            os=$(get "$f" os)
            for step in build_libs runtime build_latest build_v16 build_v14; do
              B["${os}_${step}"]=$(get "$f" "$step")
            done
          done

          # Header
          cat >> "$GITHUB_STEP_SUMMARY" << 'HDR'
          ## CI Test Report

          | | | pnpm | | Bazel | |
          |------|-------------|:---:|:---:|:---:|:---:|
          | **Test** | **Description** | **Ubuntu** | **Windows** | **Ubuntu** | **Windows** |
          HDR

          row() {
            local name="$1" desc="$2" pkey="$3" bkey="$4"
            local pu=$(icon "${P[ubuntu-latest_22_${pkey}]}")
            local pw=$(icon "${P[windows-latest_22_${pkey}]}")
            if [ -n "$bkey" ]; then
              local bu=$(icon "${B[ubuntu-latest_${bkey}]}")
              local bw=$(icon "${B[windows-latest_${bkey}]}")
            else
              local bu=""
              local bw=""
            fi
            echo "| **${name}** | ${desc} | ${pu} | ${pw} | ${bu} | ${bw} |"
          }

          REPO="https://github.com/${{ github.repository }}/blob/${{ github.sha }}"

          {
            row "pnpm structure" "[Verify pnpm isolated linker, injected deps, and lockfile](${REPO}/scripts/verify-pnpm-structure.js)" "structure" ""
            row "Build libraries" "Compile [lib-a](${REPO}/libs/lib-a), [lib-b](${REPO}/libs/lib-b), [lib-c](${REPO}/libs/lib-c) with TypeScript" "build_libs" "build_libs"
            row "Runtime isolation" "[Each package loads its own lodash version, rxjs peer deps shared](${REPO}/scripts/verify-runtime-versions.js)" "runtime" "runtime"
            row "Angular 19" "Build [app-latest](${REPO}/apps/app-latest) with esbuild application builder" "build_latest" "build_latest"
            row "Angular 16" "Build [app-v16](${REPO}/apps/app-v16) with webpack browser builder" "build_v16" "build_v16"
            row "Angular 14" "Build [app-v14](${REPO}/apps/app-v14) with webpack browser builder (NgModule)" "build_v14" "build_v14"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "pnpm tests failed"
            exit 1
          fi
          if [ "${{ needs.bazel.result }}" != "success" ]; then
            echo "Bazel builds failed"
            exit 1
          fi
          echo "All tests passed!"
