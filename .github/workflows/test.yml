name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20, 22]

    runs-on: ${{ matrix.os }}
    name: pnpm (${{ matrix.os }}, Node ${{ matrix.node-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: "Test: pnpm structure"
        id: structure
        if: always()
        run: pnpm test:structure

      - name: Build libraries
        id: build_libs
        if: always() && steps.structure.outcome != 'cancelled'
        run: pnpm build:libs

      - name: "Test: runtime version isolation"
        id: runtime
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm test:runtime

      - name: "Build: Angular 19 (application builder)"
        id: build_latest
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-latest

      - name: "Build: Angular 16 (webpack builder)"
        id: build_v16
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-v16

      - name: "Build: Angular 14 (webpack builder)"
        id: build_v14
        if: always() && steps.build_libs.outcome == 'success'
        run: pnpm build:app-v14

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p /tmp/results
          cat > "/tmp/results/pnpm_${{ matrix.os }}_node${{ matrix.node-version }}.json" << RESULTS
          {
            "os": "${{ matrix.os }}",
            "node": "${{ matrix.node-version }}",
            "structure": "${{ steps.structure.outcome }}",
            "build_libs": "${{ steps.build_libs.outcome }}",
            "runtime": "${{ steps.runtime.outcome }}",
            "build_latest": "${{ steps.build_latest.outcome }}",
            "build_v16": "${{ steps.build_v16.outcome }}",
            "build_v14": "${{ steps.build_v14.outcome }}"
          }
          RESULTS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-pnpm-${{ matrix.os }}-node${{ matrix.node-version }}
          path: /tmp/results/

  bazel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    name: Bazel (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: "Build: libraries (rules_ts)"
        id: build_libs
        if: always()
        run: bazel build //libs/lib-a:pkg //libs/lib-b:pkg //libs/lib-c:pkg

      - name: "Build: Angular 19 (esbuild, Bazel sandbox)"
        id: build_latest
        if: always() && steps.build_libs.outcome == 'success'
        run: bazel build //apps/app-latest:build

      - name: "Build: Angular 14/16 (webpack, Bazel sandbox, Linux only)"
        id: build_v14_v16
        if: always() && steps.build_libs.outcome == 'success' && runner.os != 'Windows'
        run: bazel build //apps/app-v14:build //apps/app-v16:build

      - name: Save results
        if: always()
        shell: bash
        run: |
          mkdir -p /tmp/results
          cat > "/tmp/results/bazel_${{ matrix.os }}.json" << RESULTS
          {
            "os": "${{ matrix.os }}",
            "build_libs": "${{ steps.build_libs.outcome }}",
            "build_latest": "${{ steps.build_latest.outcome }}",
            "build_v14_v16": "${{ steps.build_v14_v16.outcome }}"
          }
          RESULTS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-bazel-${{ matrix.os }}
          path: /tmp/results/

  summary:
    needs: [test, bazel]
    runs-on: ubuntu-latest
    if: always()
    name: CI Summary

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: results-*

      - name: Generate summary
        shell: bash
        run: |
          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *) echo "❓" ;;
            esac
          }

          # Read all result files
          get() {
            local file="$1" key="$2"
            grep "\"$key\"" "$file" | sed 's/.*: *"\(.*\)".*/\1/'
          }

          # --- pnpm results ---
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## pnpm builds

          Validates pnpm workspace dependencies, version isolation, and Angular builds across Node versions.

          | Test | Description | Ubuntu 18 | Ubuntu 20 | Ubuntu 22 | Windows 18 | Windows 20 | Windows 22 |
          |------|-------------|-----------|-----------|-----------|------------|------------|------------|
          HEADER

          declare -A pnpm_results
          for f in results/results-pnpm-*/pnpm_*.json; do
            [ -f "$f" ] || continue
            os=$(get "$f" os)
            node=$(get "$f" node)
            key="${os}_${node}"
            pnpm_results["${key}_structure"]=$(get "$f" structure)
            pnpm_results["${key}_build_libs"]=$(get "$f" build_libs)
            pnpm_results["${key}_runtime"]=$(get "$f" runtime)
            pnpm_results["${key}_build_latest"]=$(get "$f" build_latest)
            pnpm_results["${key}_build_v16"]=$(get "$f" build_v16)
            pnpm_results["${key}_build_v14"]=$(get "$f" build_v14)
          done

          pnpm_row() {
            local step="$1" desc="$2" key="$3"
            local u18=$(icon "${pnpm_results[ubuntu-latest_18_${key}]}")
            local u20=$(icon "${pnpm_results[ubuntu-latest_20_${key}]}")
            local u22=$(icon "${pnpm_results[ubuntu-latest_22_${key}]}")
            local w18=$(icon "${pnpm_results[windows-latest_18_${key}]}")
            local w20=$(icon "${pnpm_results[windows-latest_20_${key}]}")
            local w22=$(icon "${pnpm_results[windows-latest_22_${key}]}")
            echo "| **${step}** | ${desc} | ${u18} | ${u20} | ${u22} | ${w18} | ${w20} | ${w22} |"
          }

          {
            pnpm_row "pnpm structure" "Validates pnpm workspace structure: isolated linker, injected vs symlinked deps, version declarations, peer dep config, lockfile correctness" "structure"
            pnpm_row "Build libraries" "Compiles TypeScript libraries (lib-a, lib-b, lib-c) with tsc" "build_libs"
            pnpm_row "Runtime isolation" "Each package loads its own lodash version at runtime (4 unique versions). rxjs peer deps shared across packages. Cross-library imports work" "runtime"
            pnpm_row "Angular 19" "Application builder (esbuild). Workspace libs with isolated deps resolved correctly. Standalone components" "build_latest"
            pnpm_row "Angular 16" "Browser builder (webpack). Backward compat with webpack-based build. Standalone components" "build_v16"
            pnpm_row "Angular 14" "Browser builder (webpack). Oldest supported Angular, NgModule architecture" "build_v14"
          } >> "$GITHUB_STEP_SUMMARY"

          # --- Bazel results ---
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'

          ## Bazel builds

          Validates Bazel sandbox integration with rules_js, rules_ts, and rules_angular.

          | Test | Description | Ubuntu | Windows |
          |------|-------------|--------|---------|
          HEADER

          declare -A bazel_results
          for f in results/results-bazel-*/bazel_*.json; do
            [ -f "$f" ] || continue
            os=$(get "$f" os)
            bazel_results["${os}_build_libs"]=$(get "$f" build_libs)
            bazel_results["${os}_build_latest"]=$(get "$f" build_latest)
            bazel_results["${os}_build_v14_v16"]=$(get "$f" build_v14_v16)
          done

          bazel_row() {
            local step="$1" desc="$2" key="$3"
            local u=$(icon "${bazel_results[ubuntu-latest_${key}]}")
            local w=$(icon "${bazel_results[windows-latest_${key}]}")
            echo "| **${step}** | ${desc} | ${u} | ${w} |"
          }

          {
            bazel_row "Libraries (rules_ts)" "rules_js manages node_modules + TypeScript compilation in sandbox. Each library loads a different lodash version, testing dependency isolation through the package store" "build_libs"
            bazel_row "Angular 19 (esbuild)" "rules_angular + custom esbuild plugin. Resolves packages from .aspect_rules_js package store when standard resolution fails in sandbox" "build_latest"
            bazel_row "Angular 14/16 (webpack)" "rules_angular + custom webpack plugin. Resolves packages from .aspect_rules_js package store in sandbox. Skipped on Windows (MAX_PATH)" "build_v14_v16"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "pnpm tests failed"
            exit 1
          fi
          if [ "${{ needs.bazel.result }}" != "success" ]; then
            echo "Bazel builds failed"
            exit 1
          fi
          echo "All tests passed!"
