name: Update README with Baseline Diffs

on:
  push:
    branches: [main]
    paths:
      - 'apps/**/baseline/**'
      - 'apps/**/angular.json'
      - 'apps/**/package.json'
      - 'apps/**/src/**'
      - 'apps/**/webpack/**'
      - 'apps/**/esbuild/**'
      - 'scripts/generate-diff-report.sh'
      - 'MODULE.bazel'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate diff report
        run: |
          chmod +x scripts/generate-diff-report.sh
          ./scripts/generate-diff-report.sh > /tmp/diff-report.md

      - name: Check if diff hash changed
        id: hash_check
        run: |
          # Extract new hash from generated report
          new_hash=$(tail -1 /tmp/diff-report.md | sed -n 's/.*_diff-hash: \(.*\)_/\1/p')

          # Extract existing hash from README
          old_hash=""
          if [ -f README.md ]; then
            old_hash=$(grep -o '_diff-hash: [a-f0-9]*_' README.md | sed 's/_diff-hash: \(.*\)_/\1/' || echo "")
          fi

          echo "old_hash=$old_hash"
          echo "new_hash=$new_hash"

          if [ "$old_hash" = "$new_hash" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Diff hash unchanged, skipping README update."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Diff hash changed ($old_hash -> $new_hash), updating README."
          fi

      - name: Update README.md
        if: steps.hash_check.outputs.changed == 'true'
        run: |
          if ! grep -q '<!-- BASELINE-DIFF-START -->' README.md; then
            echo "README.md missing diff markers, skipping update."
            exit 0
          fi

          # Extract content before and after the markers
          head_content=$(sed '/<!-- BASELINE-DIFF-START -->/q' README.md)
          tail_content=$(sed -n '/<!-- BASELINE-DIFF-END -->/,$p' README.md)

          # Reassemble with new diff content
          {
            echo "$head_content"
            echo ""
            cat /tmp/diff-report.md
            echo ""
            echo "$tail_content"
          } > README.md.tmp

          mv README.md.tmp README.md

      - name: Commit and push
        if: steps.hash_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update baseline diff report in README"
          git push
